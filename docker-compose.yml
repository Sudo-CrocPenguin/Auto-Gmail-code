services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-gmail-code-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auto_gmail_code
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auto_gmail_code"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: auto-gmail-code-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: /api
      FRONTEND_URL: http://localhost:3000
      PERSISTENCE_DRIVER: prisma
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auto_gmail_code?schema=public
      JWT_SECRET: replace-with-a-strong-production-secret
      JWT_EXPIRES_IN: 1d
      TOKEN_ENCRYPTION_KEY: replace-with-a-strong-token-encryption-key
      RATE_LIMIT_AUTH_WINDOW_MS: 900000
      RATE_LIMIT_AUTH_MAX: 10
      RATE_LIMIT_GMAIL_WINDOW_MS: 60000
      RATE_LIMIT_GMAIL_MAX: 120
      RATE_LIMIT_SYNC_WINDOW_MS: 300000
      RATE_LIMIT_SYNC_MAX: 5
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_OAUTH_REDIRECT_URI: http://localhost:4000/api/gmail/oauth/callback
      GOOGLE_OAUTH_SCOPES: https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.modify
      GMAIL_SYNC_MAX_MESSAGES: 25
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
