name: Backend Check

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "refactor/**"
      - "chore/**"
      - "docs/**"

jobs:
  backend:
    name: Build, test and validate Prisma
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auto_gmail_code_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d auto_gmail_code_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 4000
      API_PREFIX: /api
      FRONTEND_URL: http://localhost:3000
      PERSISTENCE_DRIVER: memory
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auto_gmail_code_test?schema=public
      PRISMA_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auto_gmail_code_test?schema=public
      JWT_SECRET: ci-jwt-secret-with-enough-length
      JWT_EXPIRES_IN: 1d
      TOKEN_ENCRYPTION_KEY: ci-token-encryption-key-with-enough-length
      RATE_LIMIT_AUTH_WINDOW_MS: 900000
      RATE_LIMIT_AUTH_MAX: 10
      RATE_LIMIT_GMAIL_WINDOW_MS: 60000
      RATE_LIMIT_GMAIL_MAX: 120
      RATE_LIMIT_SYNC_WINDOW_MS: 300000
      RATE_LIMIT_SYNC_MAX: 5
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_OAUTH_REDIRECT_URI: http://localhost:4000/api/gmail/oauth/callback
      GOOGLE_OAUTH_SCOPES: https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.modify
      GMAIL_SYNC_MAX_MESSAGES: 25
      GMAIL_ATTACHMENT_MAX_BYTES: 5242880

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build and test memory mode
        run: npm run check

      - name: Apply Prisma migrations
        run: npm run db:deploy

      - name: Seed PostgreSQL demo data
        run: npm run db:seed

      - name: Test Prisma repositories
        run: npm run test:prisma
